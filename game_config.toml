# Viewport size is the shape of the view into the game world in game units (not necessarily the size of the window/canvas)
viewport_width = 261
viewport_height = 160
level_width = 261
level_height = 480
fps = 60.0
music_starts_on = false
render_ship = true
# Touch control layout on mobile.
# "triangle" = right half split by diagonal (top-center→bottom-right): upper-right → CW, lower-left → CCW.
# "drag" = original drag-to-aim scheme.
touch_control_scheme = "triangle"

[particle_system_params]
emission_rate = 10000
emission_speed = 250.0
max_particle_life = 5.0
damage_rate = 0.1
gravity = -40.0
elasticity = 0.3

[ship_params]
acceleration = 100.0
rotation_rate = 7.5
max_speed = 400.0

[level_params]
starting_terrain_health = 500
# Per-level time-attack limit. Crossing into the next level awards 10 bonus
# score points for each remaining whole/partial second and resets the countdown.
level_time_limit_seconds = 60.0

[visual_params]
# Index into the particle color map palette (0–3).
color_map = 1
# Brightness cutoff for bloom extraction (0.0–1.0). Lower = more of the scene glows.
# Set to 1.1 to effectively disable bloom.
bloom_threshold = 0.4
# Bloom intensity in the final composite. 0.0 = off, 1.0 = full, 2.0+ = oversaturated.
bloom_strength = 1.1
# Depth of the dual-filter bloom mip pyramid. Each level halves dimensions.
# 4 = tight halo, 6 = typical, 8 = very wide. Clamped to what the surface allows.
bloom_mip_levels = 4
# CRT post-process: barrel distortion, chromatic aberration, phosphor mask,
# scanlines, vignette. 0.0 = off, 1.0 = full.
crt_strength = 0.0
# Density-to-color mapping. density_scale = how many particles per cell for
# ~half saturation. Lower = saturates faster. density_exponent controls the
# sigmoid curve steepness: >1 = sharper transition, <1 = gentler.
density_scale = 2.0
density_exponent = 1.0
