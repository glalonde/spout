<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <!--
      user-scalable=no / maximum-scale=1 prevents the browser from
      double-tap-zooming or pinch-zooming while the game is running.
    -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0,
                   user-scalable=no, maximum-scale=1.0" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        /* Prevent browser from consuming touch events for scroll / zoom. */
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import init from "./spout.js";

      window.addEventListener("load", async () => {
        try {
          await init();
        } catch (e) {
          // winit (0.30) on WASM throws a JS exception after registering
          // requestAnimationFrame callbacks as a control-flow trick to unwind
          // the synchronous startup stack.  The game loop is already running
          // at this point; swallow the expected error and continue setup.
          if (
            typeof e?.message !== "string" ||
            !e.message.includes("Using exceptions for control flow")
          ) {
            console.error("Unexpected error during WASM init:", e);
          }
        }
      });
    </script>
  </body>
</html>
