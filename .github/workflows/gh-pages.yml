name: Deploy to GitHub Pages (production)

on:
  push:
    branches: [master]
  workflow_dispatch:

# Write permission is needed for peaceiris/actions-gh-pages to push the
# gh-pages branch. No id-token / pages write needed with the branch approach.
permissions:
  contents: write

# One production deploy at a time; cancel the in-progress one if master moves.
concurrency:
  group: pages-production
  cancel-in-progress: true

env:
  RUSTFLAGS: --cfg=web_sys_unstable_apis

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-

      - name: Get wasm-bindgen version
        id: wbg-version
        run: |
          echo "version=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock | grep '^version' | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT
      - name: Cache wasm-bindgen-cli binary
        id: cache-wasm-bindgen
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-bindgen
          key: wasm-bindgen-cli-${{ steps.wbg-version.outputs.version }}
      - name: Install wasm-bindgen-cli
        if: steps.cache-wasm-bindgen.outputs.cache-hit != 'true'
        run: cargo install wasm-bindgen-cli --version ${{ steps.wbg-version.outputs.version }} --locked

      - name: Build WebGPU
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Generate JS bindings
        run: |
          mkdir -p target/spout_web
          wasm-bindgen --no-typescript --out-dir target/spout_web --web \
            target/wasm32-unknown-unknown/release/spout.wasm
          sed "s/{{example}}/spout/g" wasm-resources/index.template.html \
            > target/spout_web/index.html

      - name: Deploy to gh-pages (root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/spout_web
          # keep_files preserves the canary/ subdirectory written by canary.yml
          keep_files: true
